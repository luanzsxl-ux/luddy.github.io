<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uma surpresa ❤️</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      font-family: 'Segoe UI', sans-serif;
    }

    .card {
      background: rgba(255,255,255,0.9);
      padding: 40px;
      border-radius: 25px;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0,0,0,0.25);
      cursor: pointer;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
      z-index: 2;
      animation: pulse 2s infinite;
    }

    .card:hover { transform: scale(1.07); }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .heart { font-size: 60px; color: red; animation: beat 1s infinite; }

    @keyframes beat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    .hidden { display: none; }

    .message {
      font-size: 18px;
      max-width: 750px;
      text-align: center;
      background: rgba(255,255,255,0.95);
      padding: 30px;
      border-radius: 25px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
      z-index: 2;
      animation: fadeIn 1.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .typing {
      border-right: 2px solid black;
      white-space: nowrap;
      overflow: hidden;
      animation: typing 4s steps(40, end), blink 0.7s infinite;
    }

    @keyframes typing {
      from { width: 0 }
      to { width: 100% }
    }

    @keyframes blink {
      50% { border-color: transparent }
    }

    .gallery {
      margin-top: 20px;
      position: relative;
      width: 200px;
      height: 200px;
      margin-left: auto;
      margin-right: auto;
    }

    .gallery img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 20px;
      opacity: 0;
      transition: opacity 1s;
    }

    .gallery img.active { opacity: 1; }

    .falling-heart {
      position: absolute;
      top: -10px;
      color: red;
      animation: fall linear infinite;
      font-size: 22px;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <div class="card" onclick="mostrarMensagem()">
    <div class="heart">❤️</div>
    <h2>Clique aqui</h2>
    <p>Eu tenho uma surpresa pra você...</p>
  </div>

  <div id="mensagem" class="hidden">
    <div class="message">
      <h2 class="typing">💖 Para o amor da minha vida 💖</h2>
      <p>
        Ana julia, você é a pessoa mais especial que eu encontrei na minha vida...<br><br>
        (Sua carta continua aqui ❤️)
      </p>

      <div class="gallery">
        <img src="foto1.jpg" class="active">
        <img src="foto2.jpg">
        <img src="foto3.jpg">
        <img src="foto4.jpg">
        <img src="foto5.jpg">
        <img src="foto6.jpg">
      </div>
    </div>
  </div>

  <audio id="musica" src="tardes.mp3"></audio>

  <script>
    function mostrarMensagem() {
      document.querySelector('.card').style.display = 'none';
      document.getElementById('mensagem').classList.remove('hidden');
      document.getElementById('musica').play();
    }

    // slideshow automático
    let index = 0;
    const imagens = document.querySelectorAll('.gallery img');

    setInterval(() => {
      imagens[index].classList.remove('active');
      index = (index + 1) % imagens.length;
      imagens[index].classList.add('active');
    }, 2500);

    // corações caindo
    setInterval(() => {
      const heart = document.createElement('div');
      heart.className = 'falling-heart';
      heart.innerText = '❤️';
      heart.style.left = Math.random() * window.innerWidth + 'px';
      heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
      document.body.appendChild(heart);

      setTimeout(() => heart.remove(), 5000);
    }, 250);
  </script>

</body>
</html>
